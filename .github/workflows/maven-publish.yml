name: Maven Package

env:
  BASE_NAME: Peaksis1
  DEPLOY_REPO: Kubernetes-Helm-AgroCD-Devops
  HELM_PATH: todolist

on:
  push:
    branches: [main]
    paths:
      - todolist/**

jobs:
  build:

    runs-on: ubuntu-latest
    
    outputs:
      image_tag: ${{ github.sha }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      working-directory: todolist
      run: mvn clean package -DskipTests

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      working-directory: todolist
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todolist:${{ github.sha }} .

    - name: Push Docker Image
      working-directory: todolist
      run: docker push ${{ secrets.DOCKER_USERNAME }}/todolist:${{ github.sha }}


  update-deploy-repo:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clone deployment repo
        run: |
          git clone https://${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/${{env.BASE_NAME}}/${{env.DEPLOY_REPO}}.git
          cd ${{env.DEPLOY_REPO}}

      - name: Update Helm values.yaml
        run: |
          cd ${{env.DEPLOY_REPO}}/${{env.HELM_PATH}}
          sed -i "s/tag:.*/tag: ${{ needs.build.outputs.image_tag }}/" values.yaml

      - name: Commit and push changes
        run: |
          cd ${{env.DEPLOY_REPO}}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tag to ${{ needs.build.outputs.image_tag }}"
          git push
